# ================================================================
#  Dependabot configuration
#  - pip (backend Python dependencies)
#  - pub (Flutter/Dart dependencies)
#  - github-actions (workflow actions)
# ================================================================

version: 2

updates:
  # ── Python backend ──────────────────────────────────────────
  - package-ecosystem: pip
    directory: /amblyopia_backend
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Asia/Kolkata
    open-pull-requests-limit: 5
    reviewers:
      - Anandhusnair007-1
    labels:
      - dependencies
      - backend
      - security
    groups:
      ml-deps:
        patterns:
          - "torch*"
          - "torchvision*"
          - "ultralytics*"
          - "mlflow*"
      fastapi-deps:
        patterns:
          - "fastapi*"
          - "uvicorn*"
          - "starlette*"
          - "pydantic*"
    ignore:
      # Pin torch major version — ML model compatibility
      - dependency-name: "torch"
        update-types: ["version-update:semver-major"]
      - dependency-name: "torchvision"
        update-types: ["version-update:semver-major"]

  # ── Flutter / Dart ──────────────────────────────────────────
  - package-ecosystem: pub
    directory: /amblyopia_app
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Asia/Kolkata
    open-pull-requests-limit: 5
    reviewers:
      - Anandhusnair007-1
    labels:
      - dependencies
      - flutter
    groups:
      flutter-core:
        patterns:
          - "flutter*"
          - "provider*"
          - "sqflite*"
      ml-vision:
        patterns:
          - "google_mlkit*"
          - "camera*"
      voice:
        patterns:
          - "speech_to_text*"
          - "flutter_tts*"

  # ── GitHub Actions ──────────────────────────────────────────
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Asia/Kolkata
    open-pull-requests-limit: 5
    reviewers:
      - Anandhusnair007-1
    labels:
      - dependencies
      - github-actions
