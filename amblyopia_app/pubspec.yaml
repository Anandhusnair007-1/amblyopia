name: amblyopia_app
description: Amblyopia Care System — Aravind Eye Hospital
publish_to: none
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # HTTP + State
  http: ^1.1.0
  provider: ^6.1.1
  shared_preferences: ^2.2.2

  # Local database (offline-first)
  sqflite: ^2.3.0
  path_provider: ^2.1.1
  path: ^1.8.3

  # Camera + Vision
  camera: ^0.10.5+9
  google_mlkit_face_detection: ^0.9.0

  # Voice
  speech_to_text: ^6.3.0
  flutter_tts: ^3.8.3
  permission_handler: ^11.0.1

  # Network
  connectivity_plus: ^5.0.2

  # Utilities
  uuid: ^4.2.1
  geolocator: ^10.1.0
  intl: ^0.20.2

  # Charts (for result display)
  fl_chart: ^0.65.0

  # PDF + Share
  pdf: ^3.10.7
  share_plus: ^7.2.1
  url_launcher: ^6.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/sounds/
    - assets/images/
    - assets/animations/
