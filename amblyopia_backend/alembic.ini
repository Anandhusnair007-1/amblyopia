# Alembic Configuration File
# https://alembic.sqlalchemy.org/en/latest/tutorial.html

[alembic]
# path to migration scripts
script_location = migrations

# file template for new revisions
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d%%(second).2d_%%(slug)s

# timezone used when rendering dates in the template
# defaults to UTC
timezone = UTC

# max length of characters for `%%(slug)s`
truncate_slug_length = 40

# version path separator
version_path_separator = os

# Override with DATABASE_URL env var in env.py (already implemented)
sqlalchemy.url = postgresql+asyncpg://amblyopia_user:amblyopia_pass@localhost:5432/amblyopia_db

[post_write_hooks]
# runs black after generation
# hooks = black
# black.type = console_scripts
# black.entrypoint = black

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %%H:%%M:%%S
