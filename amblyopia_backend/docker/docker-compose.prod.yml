# ================================================================
#  Amblyopia Care System — PRODUCTION docker-compose
#  Security hardening (DevSecOps):
#    - read_only root filesystem on all containers
#    - tmpfs for writable dirs only
#    - cap_drop: ALL (cap_add NET_BIND_SERVICE for Nginx only)
#    - no_new_privileges: true
#    - seccomp restricted profile
#    - Postgres + Redis bound to internal network only
#    - Nginx terminates TLS (Let's Encrypt)
#
#  Usage:
#    export GIT_SHA=$(git rev-parse --short HEAD)
#    export BUILD_DATE=$(date -u +%Y-%m-%dT%H:%M:%SZ)
#    export VERSION=v1.0.0-pilot-ready
#    docker compose -f docker-compose.prod.yml up -d
# ================================================================

version: "3.9"

x-security: &security
  read_only: true
  security_opt:
    - no-new-privileges:true
    - seccomp:./seccomp-restricted.json
  cap_drop:
    - ALL
  user: "1000:0"

services:

  backend:
    <<: *security
    build:
      context: ..
      dockerfile: docker/Dockerfile
      args:
        GIT_SHA:    ${GIT_SHA:-unknown}
        BUILD_DATE: ${BUILD_DATE:-unknown}
        VERSION:    ${VERSION:-v1.0.0}
    image: ghcr.io/anandhusnair007-1/amblyopia-backend:${VERSION:-latest}
    container_name: amblyopia_backend
    restart: unless-stopped
    expose: ["8000"]
    tmpfs:
      - /app/logs:mode=1777,size=256m
      - /app/tmp:mode=1777,size=128m
      - /tmp:mode=1777,size=128m
    volumes:
      - mlruns_data:/app/mlruns:z
    env_file: ../.env
    environment:
      ENVIRONMENT: production
      WEB_CONCURRENCY: "4"
      LOG_FORMAT: json
      MLFLOW_TRACKING_URI: file:///app/mlruns
    depends_on:
      postgres: {condition: service_healthy}
      redis:    {condition: service_healthy}
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8000/ready"]
      interval: 30s
      timeout:  10s
      retries:  3
      start_period: 90s
    networks: [internal]
    logging:
      driver: json-file
      options: {max-size: 50m, max-file: "5"}

  postgres:
    <<: *security
    image: postgres:15-alpine
    container_name: amblyopia_postgres
    restart: unless-stopped
    expose: ["5432"]
    volumes:
      - pg_data:/var/lib/postgresql/data:z
    tmpfs:
      - /tmp:mode=1777,size=64m
      - /run/postgresql:mode=775,size=16m
    env_file: ../.env
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout:  5s
      retries:  5
    networks: [internal]
    logging:
      driver: json-file
      options: {max-size: 20m, max-file: "3"}

  redis:
    <<: *security
    image: redis:7-alpine
    container_name: amblyopia_redis
    restart: unless-stopped
    expose: ["6379"]
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
      --save ""
      --loglevel notice
    tmpfs:
      - /tmp:mode=1777,size=32m
    env_file: ../.env
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout:  5s
      retries:  5
    networks: [internal]
    logging:
      driver: json-file
      options: {max-size: 10m, max-file: "3"}

  nginx:
    image: nginx:1.27-alpine
    container_name: amblyopia_nginx
    restart: unless-stopped
    read_only: true
    security_opt: [no-new-privileges:true]
    cap_drop:   [ALL]
    cap_add:    [NET_BIND_SERVICE]
    ports: ["80:80", "443:443"]
    tmpfs:
      - /var/cache/nginx:mode=755,size=64m
      - /var/run:mode=755,size=16m
      - /tmp:mode=1777,size=32m
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - certbot_certs:/etc/letsencrypt:ro
      - certbot_www:/var/www/certbot:ro
    depends_on: [backend]
    networks: [internal, external]
    logging:
      driver: json-file
      options: {max-size: 20m, max-file: "5"}

  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: amblyopia_prometheus
    restart: unless-stopped
    read_only: true
    security_opt: [no-new-privileges:true]
    cap_drop: [ALL]
    user: "65534:65534"
    expose: ["9090"]
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=30d
      - --web.enable-lifecycle
    volumes:
      - ../monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus:z
    networks: [internal]

  grafana:
    image: grafana/grafana:10.4.0
    container_name: amblyopia_grafana
    restart: unless-stopped
    read_only: true
    security_opt: [no-new-privileges:true]
    cap_drop: [ALL]
    user: "472:0"
    expose: ["3000"]
    tmpfs: [/tmp:mode=1777,size=32m]
    volumes:
      - grafana_data:/var/lib/grafana:z
      - ../monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ../monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    environment:
      GF_SECURITY_ADMIN_PASSWORD:     ${GRAFANA_PASSWORD:-changeme}
      GF_USERS_ALLOW_SIGN_UP:         "false"
      GF_SECURITY_DISABLE_GRAVATAR:   "true"
      GF_ANALYTICS_REPORTING_ENABLED: "false"
      GF_ANALYTICS_CHECK_FOR_UPDATES: "false"
    depends_on: [prometheus]
    networks: [internal]

  certbot:
    image: certbot/certbot:latest
    container_name: amblyopia_certbot
    volumes:
      - certbot_certs:/etc/letsencrypt:z
      - certbot_www:/var/www/certbot:z
    entrypoint: /bin/sh -c "trap exit TERM; while :; do certbot renew --quiet; sleep 12h & wait; done"
    networks: [external]

networks:
  internal: {internal: true}
  external:  {driver: bridge}

volumes:
  pg_data:
  mlruns_data:
  prometheus_data:
  grafana_data:
  certbot_certs:
  certbot_www:
