# ================================================================
#  Nginx — Amblyopia Care System Production Reverse Proxy
#  TLS: Let's Encrypt (certbot)
#  Security: HSTS, OCSP stapling, rate-limit at edge, body limit
# ================================================================

user  nginx;
worker_processes auto;
error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections 1024;
    use                epoll;
    multi_accept       on;
}

http {
    include      /etc/nginx/mime.types;
    default_type application/octet-stream;

    # ── Logging ────────────────────────────────────────────────
    log_format main_json escape=json
      '{'
        '"time":"$time_iso8601",'
        '"ip":"$remote_addr",'
        '"method":"$request_method",'
        '"uri":"$request_uri",'
        '"status":$status,'
        '"bytes":$body_bytes_sent,'
        '"referer":"$http_referer",'
        '"ua":"$http_user_agent",'
        '"request_time":$request_time,'
        '"upstream_time":"$upstream_response_time"'
      '}';

    access_log /var/log/nginx/access.log main_json;

    # ── Performance ────────────────────────────────────────────
    sendfile           on;
    tcp_nopush         on;
    tcp_nodelay        on;
    keepalive_timeout  65;
    gzip               on;
    gzip_types text/plain application/json application/javascript text/css;

    # ── Security ───────────────────────────────────────────────
    server_tokens       off;
    client_max_body_size 10m;   # medical images rarely exceed 5MB

    # Edge rate limiting: 60 req/min per IP
    limit_req_zone $binary_remote_addr zone=global:10m rate=60r/m;
    limit_req_zone $binary_remote_addr zone=auth:1m   rate=10r/m;
    limit_req_status 429;

    # ── Upstream ───────────────────────────────────────────────
    upstream backend {
        server amblyopia_backend:8000;
        keepalive 32;
    }

    # ── Redirect HTTP → HTTPS ──────────────────────────────────
    server {
        listen 80;
        server_name _;
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }
        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ── HTTPS server ───────────────────────────────────────────
    server {
        listen 443 ssl http2;
        server_name ${DOMAIN};

        # TLS
        ssl_certificate     /etc/letsencrypt/live/${DOMAIN}/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/${DOMAIN}/privkey.pem;
        ssl_session_timeout 1d;
        ssl_session_cache   shared:MozSSL:10m;
        ssl_session_tickets off;

        # Mozilla Modern compatibility
        ssl_protocols       TLSv1.3;
        ssl_prefer_server_ciphers off;

        # OCSP Stapling
        ssl_stapling        on;
        ssl_stapling_verify on;
        resolver            8.8.8.8 8.8.4.4 valid=300s;
        resolver_timeout    5s;

        # Security headers
        add_header Strict-Transport-Security  "max-age=63072000; includeSubDomains; preload" always;
        add_header X-Frame-Options            "DENY"                                         always;
        add_header X-Content-Type-Options     "nosniff"                                      always;
        add_header Referrer-Policy            "strict-origin-when-cross-origin"              always;
        add_header Permissions-Policy         "geolocation=(), microphone=(), camera=()"     always;
        add_header Content-Security-Policy
          "default-src 'self'; img-src 'self' data:; script-src 'self'; style-src 'self' 'unsafe-inline'"
          always;
        add_header Cache-Control              "no-store"                                     always;

        # Strip server identity
        more_clear_headers Server;
        more_clear_headers X-Powered-By;

        # ── API proxy ─────────────────────────────────────────
        location /api/ {
            limit_req zone=global burst=20 nodelay;

            proxy_pass         http://backend;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   Connection        "";
            proxy_read_timeout 120s;
        }

        # ── Auth endpoint (stricter rate limit) ───────────────
        location /api/v1/auth/ {
            limit_req zone=auth burst=5 nodelay;
            proxy_pass       http://backend;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ── Health / readiness (no rate limit, no auth) ───────
        location ~ ^/(health|ready|metrics) {
            proxy_pass http://backend;
            proxy_set_header Host $host;
            access_log off;
        }

        # ── Grafana ───────────────────────────────────────────
        location /grafana/ {
            limit_req zone=global burst=10;
            proxy_pass http://amblyopia_grafana:3000/;
            proxy_set_header Host $host;
        }

        # Block everything else
        location / {
            return 404;
        }
    }
}
